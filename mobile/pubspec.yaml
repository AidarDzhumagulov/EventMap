name: event_map
description: Event Map — social map of events for Bishkek and Almaty.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.4.3

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # Map (OpenStreetMap, no API key needed. Tile provider swappable to 2GIS)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Fonts
  google_fonts: ^6.2.1

  # Location
  geolocator: ^13.0.1

  # Utils
  equatable: ^2.0.5
  intl: ^0.19.0

  # Image picker
  image_picker: ^1.1.2

  # Share & Deep Links
  screenshot: ^3.0.0
  share_plus: ^10.0.2
  app_links: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter_native_splash:
  color: "#1A1A2E"
  image: "assets/images/icon.png"
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
