services:
  db:
    image: postgis/postgis:16-3.5
    container_name: postgres_event_map
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /data/postgres_event_map
    volumes:
      - db:/data/postgres_event_map
    command: ["postgres", "-p", "${DB_PORT}"]
    ports:
      - "${DB_PORT}:${DB_PORT}"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p ${DB_PORT} -U ${DB_USER} -d ${DB_NAME} || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    image: arigaio/atlas:latest-alpine
    command: >
      migrate apply
      --url "postgres://${DB_USER}:${DB_PASSWORD}@db:${DB_PORT}/${DB_NAME}?sslmode=disable"
      --dir "file:///migrations"
      --allow-dirty
    volumes:
      - ./migrations:/migrations:ro
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event_map_api
    env_file: .env
    environment:
      DB_HOST: db
    ports:
      - "8082:8080"
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  db:
